<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор тестів — FoxTest</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Глобальні виправлення для скролу та фону */
        html, body {
            height: auto !important;
            overflow-y: auto !important;
            background-color: #f4f7f9;
            margin: 0;
            padding: 0;
        }

        .create-container { 
            max-width: 850px; 
            width: 95%;
            margin: 40px auto; 
            padding-bottom: 100px;
        }
        
        .q-item { 
            background: #fff; 
            padding: 25px; 
            border-radius: 15px; 
            margin-bottom: 30px; 
            border-left: 8px solid #9b59b6; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.07);
            position: relative;
        }

        .remove-q-btn {
            position: absolute; right: -15px; top: -15px;
            background: #ff4d4d; color: white; border: none;
            border-radius: 50%; width: 35px; height: 35px; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        /* Контейнер варіантів */
        .options-box {
            background: #fdfaff;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            border: 2px dashed #d1b3ff;
        }

        /* ГОРИЗОНТАЛЬНИЙ РЯДОК ВАРІАНТУ */
        .opt-row {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            gap: 12px !important;
            width: 100% !important;
            margin-bottom: 15px !important;
            flex-wrap: nowrap !important;
        }

        .opt-input-wrapper {
            flex-grow: 1 !important;
            position: relative;
        }

        .opt-input { 
            width: 100% !important;
            flex-grow: 1 !important;
            min-width: 0 !important; /* Дозволяє інпуту не розпирати флекс */
            padding: 12px !important;
            margin: 0 !important;
            font-size: 16px !important;
            border: 1px solid #ccc !important;
            border-radius: 8px !important;
            box-sizing: border-box !important;
        }

        .correct-radio {
            width: 22px !important;
            height: 22px !important;
            flex-shrink: 0 !important;
            cursor: pointer;
            accent-color: #27ae60;
        }

        .delete-opt-btn {
            background: none !important;
            border: none !important;
            cursor: pointer;
            font-size: 20px;
            flex-shrink: 0 !important;
            padding: 5px;
        }

        /* Поле ручного вводу */
        .manual-ans-box {
            background: #fff9e6; padding: 20px; border-radius: 10px;
            border: 2px solid #ffeeba; margin-top: 15px;
        }

        .q-a-manual {
            width: 100% !important;
            font-size: 18px;
            padding: 12px;
            border: 2px solid #ffcc00;
            border-radius: 8px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        /* Лічильники символів */
        .char-counter {
            font-size: 11px;
            color: #888;
            text-align: right;
            margin-top: 2px;
        }

        .code-banner {
            display: flex; align-items: center; justify-content: space-between;
            background: #f0f4ff; padding: 15px; border-radius: 10px;
            border: 2px solid #1a73e8; margin-bottom: 25px;
        }

        .code-text { font-family: monospace; font-size: 24px; font-weight: bold; color: #1a73e8; }
    </style>
</head>
<body>
    <div class="container create-container">
        <button onclick="window.location.href='index.html'" class="secondary-btn" style="width:auto; margin-bottom:15px;">🏠 На головну</button>
        <h2>🛠️ Створення тесту</h2>

        <div class="box">
            <label>Назва курсу / тесту:</label>
            <input type="text" id="c-title" maxlength="100" oninput="updateCounter(this, 100, 'title-count')" placeholder="Введіть назву...">
            <div id="title-count" class="char-counter">Залишилось: 100</div>

            <div class="code-banner">
                <div>
                    <span style="font-size: 13px; color: #666;">Унікальний код:</span><br>
                    <span id="c-code-display" class="code-text">...</span>
                </div>
                <button onclick="copyCode()" class="secondary-btn" style="width:auto;">📋 Копіювати</button>
            </div>
        </div>

        <div id="q-list"></div>

        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button onclick="addQ()" class="secondary-btn" style="background: #9b59b6; color: white; flex: 1;">➕ Додати питання</button>
            <button onclick="saveNewTest()" id="save-btn" class="primary-btn" style="flex: 1; background: #27ae60;">🚀 Опублікувати</button>
        </div>
    </div>

    <script>
        if (localStorage.getItem('admin_authorized') !== 'true') window.location.href = 'index.html';

        let generatedCode = "";
        const LIMITS = { q: 300, opt: 150 };

        async function init() {
            try {
                const res = await fetch('/api/get-unique-code');
                const data = await res.json();
                generatedCode = data.code;
                document.getElementById('c-code-display').innerText = generatedCode;
                addQ();
            } catch (e) { alert("Помилка зв'язку з сервером"); }
        }

        function updateCounter(el, limit, countId) {
            const rem = limit - el.value.length;
            const c = document.getElementById(countId);
            if (c) {
                c.innerText = `Залишилось: ${rem}`;
                c.style.color = rem < 10 ? 'red' : '#888';
            }
        }

        function addQ() {
            const qId = Date.now();
            const html = `
                <div class="q-item" id="q-${qId}">
                    <button class="remove-q-btn" onclick="document.getElementById('q-${qId}').remove()">×</button>
                    <label>📝 Текст запитання:</label>
                    <input type="text" class="q-t" maxlength="${LIMITS.q}" oninput="updateCounter(this, ${LIMITS.q}, 'cnt-q-${qId}')" placeholder="Наприклад: Скільки буде 2+2?">
                    <div id="cnt-q-${qId}" class="char-counter">Залишилось: ${LIMITS.q}</div>

                    <div class="options-box">
                        <label><b>Варіанти відповідей:</b> (виберіть правильний крапкою)</label>
                        <div id="opts-container-${qId}" style="margin-top: 10px;"></div>
                        <button onclick="addOption('${qId}')" class="secondary-btn" style="width:auto; font-size:12px; margin-top:10px;">+ Додати варіант</button>
                    </div>

                    <div id="manual-box-${qId}" class="manual-ans-box">
                        <label>⌨️ Впишіть правильну відповідь (якщо немає варіантів):</label>
                        <input type="text" class="q-a-manual" maxlength="${LIMITS.opt}" placeholder="Правильна відповідь...">
                    </div>
                </div>
            `;
            document.getElementById('q-list').insertAdjacentHTML('beforeend', html);
            updateUI(qId);
        }

        function addOption(qId) {
            const container = document.getElementById(`opts-container-${qId}`);
            const optId = Math.random().toString(36).substr(2, 9);
            const html = `
                <div class="opt-row">
                    <input type="radio" name="correct-${qId}" class="correct-radio">
                    <div class="opt-input-wrapper">
                        <input type="text" class="opt-input" maxlength="${LIMITS.opt}" 
                               oninput="updateCounter(this, ${LIMITS.opt}, 'cnt-opt-${optId}')" 
                               placeholder="Текст варіанту...">
                        <div id="cnt-opt-${optId}" class="char-counter">Залишилось: ${LIMITS.opt}</div>
                    </div>
                    <button type="button" class="delete-opt-btn" onclick="this.parentElement.remove(); updateUI('${qId}');">🗑️</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            updateUI(qId);
        }

        function updateUI(qId) {
            const opts = document.getElementById(`opts-container-${qId}`);
            const manual = document.getElementById(`manual-box-${qId}`);
            manual.style.display = opts.children.length > 0 ? 'none' : 'block';
        }

        async function saveNewTest() {
            const title = document.getElementById('c-title').value.trim();
            const qBlocks = document.querySelectorAll('.q-item');

            if (!title || qBlocks.length === 0) return alert("Заповніть назву та додайте питання!");

            let questions = [];
            for (let block of qBlocks) {
                const text = block.querySelector('.q-t').value.trim();
                const optRows = block.querySelectorAll('.opt-row');
                let options = [], correct_ans = "";

                if (optRows.length > 0) {
                    let foundCorrect = false;
                    optRows.forEach(row => {
                        const val = row.querySelector('.opt-input').value.trim();
                        if (val) {
                            options.push(val);
                            if (row.querySelector('.correct-radio').checked) {
                                correct_ans = val;
                                foundCorrect = true;
                            }
                        }
                    });
                    if (!foundCorrect) return alert("Позначте правильний варіант у питанні: " + text);
                } else {
                    correct_ans = block.querySelector('.q-a-manual').value.trim();
                }

                if (!text || !correct_ans) return alert("Заповніть всі поля!");
                questions.push({ text, correct_ans, options });
            }

            const res = await fetch('/api/create-test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: generatedCode, title, initialQuestions: questions })
            });

            if (res.ok) {
                alert("Тест створено! Код: " + generatedCode);
                navigator.clipboard.writeText(generatedCode);
                window.location.href = 'index.html';
            }
        }

        function copyCode() {
            navigator.clipboard.writeText(generatedCode);
            alert("Код скопійовано!");
        }

        init();
    </script>
</body>
</html>
