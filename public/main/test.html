<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестування — FoxTest</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .test-container { max-width: 700px; text-align: center; }
        .progress-container { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-bottom: 30px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #9b59b6, #1a73e8); transition: 0.3s; }
        
        .question-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .question-text { font-size: 22px; font-weight: bold; margin-bottom: 25px; color: #333; }
        
        /* Стилі для кнопок-варіантів */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .option-btn { 
            padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; 
            background: #ffffff; cursor: pointer; font-size: 16px; transition: 0.2s;
            text-align: left; display: flex; align-items: center; color: #000000;
        }
        .option-btn:hover { border-color: #1a73e8; background: #f0f7ff; transform: translateY(-2px); }
        .option-btn:active { transform: translateY(0); }

        /* Стилі для ручного вводу */
        .manual-input-box { display: flex; flex-direction: column; gap: 15px; }
        .manual-input-box input { font-size: 18px; padding: 12px; text-align: center; }

        #timer-display { font-family: monospace; color: #777; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container test-container">
        <h2 id="test-title">Завантаження тесту...</h2>
        
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="test-area" style="display: none;">
            <div class="question-card">
                <div id="question-text" class="question-text">Тут буде питання</div>
                <div id="answer-options" class="options-grid">
                    <!-- Сюди JS вставить кнопки або поле вводу -->
                </div>
            </div>
        </div>

        <div id="result-area" style="display: none;">
            <h2>🎉 Тест завершено!</h2>
            <div class="box">
                <p>Ваш результат: <strong id="score-display">0/0</strong></p>
                <button onclick="window.location.href='index.html'" class="primary-btn">Повернутись на головну</button>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const testCode = params.get('code');
        const studentName = params.get('name') + " " + params.get('surname');

        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let startTime = 0;

        async function initTest() {
            if (!testCode) return window.location.href = 'index.html';

            try {
                const res = await fetch(`/api/questions/${testCode}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                questions = data.questions;
                document.getElementById('test-title').innerText = data.title;
                
                if (questions.length > 0) {
                    document.getElementById('test-area').style.display = 'block';
                    showQuestion();
                }
            } catch (err) {
                alert("Помилка завантаження тесту або код невірний.");
                window.location.href = 'index.html';
            }
        }

        function showQuestion() {
            const q = questions[currentIndex];
            const qText = document.getElementById('question-text');
            const ansArea = document.getElementById('answer-options');
            const bar = document.getElementById('progress-bar');

            // Оновлюємо прогрес
            bar.style.width = ((currentIndex / questions.length) * 100) + "%";
            qText.innerText = q.text;
            ansArea.innerHTML = "";
            
            // Засікаємо час
            startTime = Date.now();

            if (q.options && q.options.length > 0) {
                // ТИП 1: Вибір варіантів (Кнопки)
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => submitAnswer(opt);
                    ansArea.appendChild(btn);
                });
            } else {
                // ТИП 2: Відкрите питання (Поле вводу)
                ansArea.className = "manual-input-box";
                ansArea.innerHTML = `
                    <input type="text" id="manual-ans" placeholder="Впишіть вашу відповідь..." onkeypress="handleEnter(event)">
                    <button onclick="submitManual()" class="primary-btn">Відповісти</button>
                `;
                document.getElementById('manual-ans').focus();
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') submitManual();
        }

        function submitManual() {
            const val = document.getElementById('manual-ans').value.trim();
            if (val) submitAnswer(val);
        }

        async function submitAnswer(studentAnswer) {
            const q = questions[currentIndex];
            const timeSpent = (Date.now() - startTime) / 1000;

            // Відправляємо на сервер для аналітики
            try {
                const res = await fetch('/api/submit-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        questionId: q.id,
                        answer: studentAnswer,
                        timeSpent: timeSpent,
                        student: studentName,
                        testCode: testCode
                    })
                });
                const result = await res.json();
                if (result.success) score++;
            } catch (err) {
                console.error("Помилка відправки:", err);
            }

            // Перехід далі
            currentIndex++;
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                finishTest();
            }
        }

        function finishTest() {
            document.getElementById('test-area').style.display = 'none';
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('score-display').innerText = `${score} з ${questions.length}`;
        }

        // Запуск
        initTest();

        // Простий візуальний таймер для студента
        setInterval(() => {
            if (startTime && currentIndex < questions.length) {
                const sec = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('timer-display').innerText = `Час на питання: ${sec}с`;
            }
        }, 100);
    </script>
</body>
</html>
